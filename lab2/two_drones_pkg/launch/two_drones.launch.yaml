launch:
    - arg:
        name: "static"
        default: "false"

    - arg:
        name: "foxglove"
        default: "true"

    - node:
        if: "$(var static)"
        pkg: tf2_ros
        exec: "static_transform_publisher"
        name: "av1broadcaster"
        args: "1 0 0 0 0 0 world av1"

    - node:
        if: "$(var static)"
        pkg: tf2_ros
        exec: "static_transform_publisher"
        name: "av2broadcaster"
        args: "0 0 1 0 0 0 world av2"

    - node:
        unless: "$(var static)"
        pkg: two_drones_pkg
        exec: "frames_publisher_node"
        name: "frames_publisher_node"

    - node:
        pkg: two_drones_pkg
        exec: "plots_publisher_node"
        name: "plots_publisher_node"

    - node:
        if: "$(var foxglove)"
        pkg: foxglove_bridge
        exec: foxglove_bridge
        name: foxglove_bridge
